<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-box">
        <label style="display:block">Enter Key</label>
        <input id="key-input" type="text">
        <button id="key-submit">Enter</button>
    </div>
    <div id="input-box">
        <label>Head</label>
        <input id="head" type="text" style="display:block">
        <label>Body</label>
        <textarea id="body" name="load" rows=3 cols=30></textarea>
        <div id="buttons-div">
            <button id="submit-button">Submit</button>
            <button class="refresh-button">Refresh</button>
        </div>
    </div>
    <div id="header-box"></div>
    <div id=note-view>
        <div id="note-display-div">
            <div id="note-head"></div>
            <div id="note-body"></div>
        </div>
        <button id="delete-note-button">Delete</button>
    </div>
    <script src="script.js"></script>    
</body>
</html>
